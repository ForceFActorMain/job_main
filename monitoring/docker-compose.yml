services:
  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - monitoring

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - monitoring

  loki:
    image: grafana/loki:2.9.0
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yaml:/etc/loki-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki-config.yaml
    networks:
      - monitoring

  node-exporter-target:
    image: prom/node-exporter:latest
    container_name: node-exporter-target
    restart: unless-stopped
    networks:
      - monitoring

  promtail-target:
    image: grafana/promtail:2.9.0
    container_name: promtail-target
    restart: unless-stopped
    volumes:
      - ./target/promtail-config.yaml:/etc/promtail/config.yaml
      - /var/log:/var/log:ro                  
    networks:
      - monitoring
    depends_on:
      - loki

volumes:
  loki_data:

networks:
  monitoring:
    driver: bridge